name = "khamakey-nfc"
main = "worker.js"
compatibility_date = "2026-06-25"

# Variabili pubbliche (aggiorna PAGES_ASSET_BASE se usi un dominio custom)
[vars]
PAGES_ASSET_BASE = "https://khamakey-app.pages.dev"
WORKER_PUBLIC_BASE = "https://khamakey-nfc.khamakey-nfc.workers.dev"

# Bucket R2 per foto, video e audio (Moments + Business)
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "khamakey-media"

# Segreti da impostare con `wrangler secret put`:
# SUPABASE_URL
# SUPABASE_PUBLISHABLE_KEY
# ANALYTICS_INGEST_KEY
# VISITOR_SALT
# RESEND_API_KEY          (opzionale, per prenotazioni email)
# RESEND_FROM_EMAIL       (opzionale)
# RESEND_WEBHOOK_SECRET   (whsec_... dalla dashboard Resend — verifica firma webhook Svix)
# SHOPIFY_SHOP_DOMAIN     (es. dj0wgt-0g.myshopify.com)
# SHOPIFY_CLIENT_ID       (Dev dashboard → Credenziali)
# SHOPIFY_CLIENT_SECRET   (shpss_... — anche per webhook HMAC)
# SHOPIFY_ACCESS_TOKEN    (opzionale shpat_ — alternativa a client id/secret)
# SHOPIFY_WEBHOOK_SECRET  (alias legacy di SHOPIFY_CLIENT_SECRET)
# PAYPAL_CLIENT_ID          (Sprint F)
# PAYPAL_CLIENT_SECRET
# PAYPAL_WEBHOOK_ID
# PAYPAL_ENV               (opzionale: "sandbox" in test, default live)
# OPENAI_API_KEY          (Sprint G — traduzioni Business)
# OPENAI_MODEL            (opzionale, default gpt-4o-mini)
# SUPABASE_SERVICE_ROLE_KEY (opzionale, log webhook in DB)
# WEBHOOK_INGEST_KEY (RSVP, guestbook, anniversari, webhook Shopify)

[triggers]
crons = ["0 7 * * *"]
